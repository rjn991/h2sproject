# Google Cloud Build Configuration for BridgeLink
steps:
  # 1. Build the production Docker image with build-time arguments (NEXT_PUBLIC_)
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID',
      '-t', 'gcr.io/$PROJECT_ID/bridgelink',
      '.'
    ]

  # 2. Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bridgelink']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'bridgelink',
      '--image', 'gcr.io/$PROJECT_ID/bridgelink',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'GEMINI_API_KEY=$_GEMINI_API_KEY'
    ]

images:
  - 'gcr.io/$PROJECT_ID/bridgelink'

substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'YOUR_API_KEY'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'YOUR_AUTH_DOMAIN'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'YOUR_PROJECT_ID'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'YOUR_STORAGE_BUCKET'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 'YOUR_SENDER_ID'
  _NEXT_PUBLIC_FIREBASE_APP_ID: 'YOUR_APP_ID'
  _GEMINI_API_KEY: 'YOUR_GEMINI_API_KEY'

